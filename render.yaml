services:
  - type: web
    name: rag-lab
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: EMBEDDING_PROVIDER
        value: openai # or: voyage
      - key: OPENAI_API_KEY
        sync: false # Render prompts you to paste it; not stored in the repo
      - key: LLM_PROVIDER
        value: openai # or: anthropic (then add ANTHROPIC_API_KEY)
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: VOYAGE_API_KEY
      #   sync: false
